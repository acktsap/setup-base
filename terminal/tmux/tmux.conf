# =============================================================================
# General
# =============================================================================

# use tmux-256color for better italic/undercurl support (over screen-256color)
set -g default-terminal "tmux-256color"

# enable mouse for pane selection and scrolling
set -g mouse on

# remove delay after Esc key (critical for vim/neovim)
set -sg escape-time 0

# increase scrollback buffer to 50000 lines (default: 2000)
set -g history-limit 50000


# =============================================================================
# Prefix
# =============================================================================

# unbind default prefix C-b
unbind C-b
# set new prefix to C-a
set -g prefix C-a

# C-a C-a sends the prefix through to the terminal (line-start)
bind C-a send-prefix


# =============================================================================
# Indexing
# =============================================================================

# start window numbering at 1 instead of 0
set -g base-index 1
# renumber windows automatically when one is closed
set -g renumber-windows on

# start pane numbering at 1 instead of 0
set -g pane-base-index 1


# =============================================================================
# Key Bindings
# =============================================================================

# --- pane split (prefix) ---
# prefix v: split pane horizontally
bind-key v split-window -h
# prefix s: split pane vertically
bind-key s split-window -v

# --- pane navigation (prefix + hjkl) ---
# prefix h: move to left pane
bind h select-pane -L
# prefix j: move to pane below
bind j select-pane -D
# prefix k: move to pane above
bind k select-pane -U
# prefix l: move to right pane
bind l select-pane -R

# --- pane navigation (M-hjkl, no prefix) ---
# M-h: move to left pane without prefix
bind -n M-h select-pane -L
# M-j: move to pane below without prefix
bind -n M-j select-pane -D
# M-k: move to pane above without prefix
bind -n M-k select-pane -U
# M-l: move to right pane without prefix
bind -n M-l select-pane -R

# --- window navigation (M-1..5, M-n/p, no prefix) ---
# M-1: jump to window 1
bind -n M-1 select-window -t 1
# M-2: jump to window 2
bind -n M-2 select-window -t 2
# M-3: jump to window 3
bind -n M-3 select-window -t 3
# M-4: jump to window 4
bind -n M-4 select-window -t 4
# M-5: jump to window 5
bind -n M-5 select-window -t 5
# M-n: go to next window
bind -n M-n next-window
# M-p: go to previous window
bind -n M-p previous-window

# --- M-w key table ---
# M-w enters split_table; keys can be pressed with or without Alt held
# M-w: enter split_table key table
bind-key -n M-w switch-client -T split_table

# M-w h: split left of current pane
bind-key -T split_table h   split-window -hb
# M-w M-h: split left of current pane (Alt held)
bind-key -T split_table M-h split-window -hb
# M-w l: split right of current pane
bind-key -T split_table l   split-window -h
# M-w M-l: split right of current pane (Alt held)
bind-key -T split_table M-l split-window -h
# M-w k: split above current pane
bind-key -T split_table k   split-window -vb
# M-w M-k: split above current pane (Alt held)
bind-key -T split_table M-k split-window -vb
# M-w j: split below current pane
bind-key -T split_table j   split-window -v
# M-w M-j: split below current pane (Alt held)
bind-key -T split_table M-j split-window -v

# M-w n: open new window
bind-key -T split_table n   new-window
# M-w M-n: open new window (Alt held)
bind-key -T split_table M-n new-window

# M-w w: open session/window tree
bind-key -T split_table w   choose-tree -s
# M-w M-w: open session/window tree (Alt held)
bind-key -T split_table M-w choose-tree -s


# =============================================================================
# Status Bar
# =============================================================================

# place status bar at the top
set -g status-position top
# align window list to the left
set -g status-justify left
# refresh status bar every 3 seconds
set -g status-interval 3

# clear left section of status bar
set -g status-left ""
# show CPU usage on the right (macOS: top -n 0 skips process list for speed; Linux: top -bn1)
set -g status-right "#[fg=blue,bg=default]#[fg=blue]CPU #(if [ $(uname) = 'Darwin' ]; then top -l 1 -n 0 | grep '^CPU' | awk '{print $3}'; else top -bn1 | grep 'Cpu(s)' | awk '{print $2 + $4}' | awk '{print $1"%"}'; fi) #[fg=blue,bg=default]#[default]"

# explicitly disable activity/silence monitoring to prevent yellow tab highlights
setw -g monitor-activity off
setw -g monitor-silence 0

# =============================================================================
# Theme
# =============================================================================

# transparent status bar background, white text
set -g status-style bg=default,fg=white

# inactive window tab format: index:name + AI status indicator
setw -g window-status-format " #I:#W#(tmux-ai-status #{pane_id}) "
# active window tab format: [index:name] + AI status indicator
setw -g window-status-current-format " [#I:#W#(tmux-ai-status #{pane_id})] "
# remove separator between window tabs
setw -g window-status-separator ""
# active window tab text color
setw -g window-status-current-style fg=blue

# inactive pane border color (dark)
set -g pane-border-style fg=black
# active pane border color (bright gray)
set -g pane-active-border-style fg=brightblack

# https://github.com/tmux/tmux/issues/1689
# copy mode selection style (bold may not apply depending on terminal)
set -g mode-style bg=white,fg=black,bold
